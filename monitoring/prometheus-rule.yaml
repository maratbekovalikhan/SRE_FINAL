apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: task-api-slo-rules
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: task_api_slo_alerts
      rules:
        - alert: HighErrorRate
          expr: |
            sum(rate(http_requests_total{status=~"5.."}[5m])) /
            clamp_min(sum(rate(http_requests_total[5m])), 0.001) > 0.001
          for: 2m
          labels:
            severity: critical
            team: sre
          annotations:
            summary: Error rate exceeds SLO (>0.1%)
            description: Current error rate is above 0.1% for the last 5 minutes.

        - alert: HighLatency
          expr: |
            histogram_quantile(0.99,
              sum(rate(http_request_duration_seconds_bucket[5m])) by (le, handler)
            ) > 0.5
          for: 3m
          labels:
            severity: warning
            team: sre
          annotations:
            summary: p99 latency exceeds 500ms SLO
            description: Handler {{ $labels.handler }} has p99 latency above 500ms.

        - alert: TaskWriteFailureRate
          expr: |
            sum(rate(task_operations_total{operation=~"create|update|delete",result!="success"}[10m])) /
            clamp_min(sum(rate(task_operations_total{operation=~"create|update|delete"}[10m])), 0.001) > 0.01
          for: 10m
          labels:
            severity: warning
            team: sre
          annotations:
            summary: Task write success ratio fell below 99%
            description: Create, update, or delete operations are failing too often.

        - alert: PodCrashLooping
          expr: |
            rate(kube_pod_container_status_restarts_total{namespace="task-api"}[15m]) > 0
          for: 5m
          labels:
            severity: critical
            team: sre
          annotations:
            summary: Pod {{ $labels.pod }} is crash looping
            description: One or more task-api pods restarted during the last 15 minutes.

    - name: infrastructure_alerts
      rules:
        - alert: NodeHighCPU
          expr: |
            100 - (avg by(instance)(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
          for: 5m
          labels:
            severity: warning
            team: sre
          annotations:
            summary: Node CPU > 85%
            description: Node CPU utilization is above 85%.

        - alert: NodeHighMemory
          expr: |
            (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
          for: 5m
          labels:
            severity: warning
            team: sre
          annotations:
            summary: Node memory > 85%
            description: Node memory utilization is above 85%.
