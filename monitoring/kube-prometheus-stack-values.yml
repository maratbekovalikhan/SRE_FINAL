prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

alertmanager:
  config:
    global:
      resolve_timeout: 5m
      slack_api_url: https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK
    route:
      receiver: slack-notifications
      group_by:
        - alertname
        - severity
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - matchers:
            - severity="critical"
          receiver: slack-critical
          continue: true
        - matchers:
            - severity="warning"
          receiver: slack-notifications
    receivers:
      - name: slack-critical
        slack_configs:
          - channel: "#alerts-critical"
            title: "CRITICAL: {{ .CommonAnnotations.summary }}"
            text: "{{ range .Alerts }}{{ .Annotations.description }}{{ end }}"
            color: "#FF0000"
      - name: slack-notifications
        slack_configs:
          - channel: "#alerts"
            title: "{{ .CommonAnnotations.summary }}"
            text: "{{ range .Alerts }}{{ .Annotations.description }}{{ end }}"
            color: "#FFA500"
    inhibit_rules:
      - source_matchers:
          - severity="critical"
        target_matchers:
          - severity="warning"
        equal:
          - alertname
