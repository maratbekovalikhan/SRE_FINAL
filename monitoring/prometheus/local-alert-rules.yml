groups:
  - name: task_api_local_alerts
    rules:
      - alert: HighErrorRate
        expr: |
          sum(rate(http_requests_total{status=~"5.."}[5m])) /
          clamp_min(sum(rate(http_requests_total[5m])), 0.001) > 0.05
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: Error rate is above 5%
          description: The local demo app is returning too many 5xx responses.

      - alert: HighLatency
        expr: |
          histogram_quantile(0.99,
            sum(rate(http_request_duration_seconds_bucket[5m])) by (le, handler)
          ) > 0.5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: p99 latency is above 500ms
          description: One of the endpoints is slower than the SLO target.

      - alert: TaskWriteFailureRate
        expr: |
          sum(rate(task_operations_total{operation=~"create|update|delete",result!="success"}[5m])) /
          clamp_min(sum(rate(task_operations_total{operation=~"create|update|delete"}[5m])), 0.001) > 0.01
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: Task write success ratio fell below 99%
          description: Create, update, or delete requests are failing too often in the demo workload.
