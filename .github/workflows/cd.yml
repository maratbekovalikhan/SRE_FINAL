name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  IMAGE_REF: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  security-scan:
    name: Security Scan
    needs: build-and-push
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_REF }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "0"

  deploy-to-cluster:
    name: Deploy To Cluster
    needs:
      - build-and-push
      - security-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check kubeconfig secret exists
        id: check
        run: |
          if [ -z "${{ secrets.KUBE_CONFIG_DATA }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup kubectl
        if: steps.check.outputs.skip == 'false'
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Load kubeconfig
        if: steps.check.outputs.skip == 'false'
        run: |
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 --decode > "$RUNNER_TEMP/kubeconfig"
          echo "KUBECONFIG=$RUNNER_TEMP/kubeconfig" >> "$GITHUB_ENV"

      - name: Deploy to Kubernetes
        if: steps.check.outputs.skip == 'false'
        run: |
          sed -i -E "0,/image: .*/s|image: .*|image: ${IMAGE_REF}|" k8s/05-app.yaml

          kubectl apply -f k8s/00-namespace.yaml
          kubectl apply -f k8s/01-configmap.yaml
          kubectl apply -f k8s/02-secret.yaml
          kubectl apply -f k8s/03-postgres.yaml
          kubectl apply -f k8s/04-redis.yaml
          kubectl apply -f k8s/05-app.yaml
          kubectl apply -f k8s/06-ingress.yaml
          kubectl apply -f k8s/07-hpa.yaml

      - name: Apply monitoring resources
        if: steps.check.outputs.skip == 'false'
        run: |
          kubectl get namespace monitoring >/dev/null 2>&1 || exit 0
          kubectl apply -f monitoring/servicemonitor.yaml
          kubectl apply -f monitoring/prometheus-rule.yaml

      - name: Wait for rollout
        if: steps.check.outputs.skip == 'false'
        run: |
          kubectl rollout status deployment/postgres -n task-api --timeout=180s
          kubectl rollout status deployment/redis -n task-api --timeout=180s
          kubectl rollout status deployment/task-api -n task-api --timeout=300s
